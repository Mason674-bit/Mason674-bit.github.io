<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Cards Demo</title>
        <link href="css/style.css" rel="stylesheet">
    </head>
    <body>
        <div id="single-column">

            <!-- flexbox container -->
            <div id="card-container">

                <!-- flexbox item -->
                <div class="card">
                    <h3>Mario</h3>
                    <img
                        src="images/mario.webp"
                        alt="mario"
                        height="245"
                    >
                    <p>
                        It's a me, Mario!
                    </p>

                    <div id="section-1">
                        <a href="#" class="button simple"> View Profile</a>
                    </div>

                </div>

                <!-- flexbox item -->
                <div class="card">
                    <h3>Luigi</h3>
                    <img
                        src="images/luigi.webp"
                        alt="luigi"
                        height="245"
                    >
                    <p>
                        Luigi time!
                    </p>

                    <div id="section-1">
                        <a href="#" class="button simple"> View Profile</a>
                    </div>
                </div>

                <!-- flexbox item -->
                <div class="card">
                    <h3>Toad</h3>
                    <img
                        src="images/toad.webp"
                        alt="toad"
                        height="245"
                    >
                    <p>
                        Don't touch that mushroom!
                    </p>

                    <div id="section-1">
                        <a href="#" class="button simple"> View Profile</a>
                    </div>
                </div>

            </div>

        </div>
    </body>
</html>
