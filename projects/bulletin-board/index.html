<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Bulletin Board (Exercise)</title>
        <link href="css/setup.css" rel="stylesheet">
        <link href="css/style.css" rel="stylesheet" data-meal-prep>
    </head>
    <body>
        <div id="bulletin-board">

            <div class="post-it yellow">

                <h2>
                    Note to self
                </h2>

                <h3>
                    don't forget to get
                    the groceries after
                    work!
                </h3>

            </div>

            <div class="post-it pink">

                <h2>
                    Just
                    Breathe
                </h2>

            </div>

            <div class="post-it red">

                <h2>
                    Call mom this
                    weekend
                </h2>

            </div>

            <div class="post-it image">

                <img 
                    src="images/cat.jpg"
                    alt="a bowl of cereal"
                    height="150"
                >

            </div>

            <div class="post-it blue">

                <h2>
                    Grocery list

                </h2>

                <ul>

                    <li>
                        Mlik
                    </li>

                    <li>
                        Eggs
                    </li>

                    <li>
                        Ice cream
                    </li>

                    <li>
                        Chicken
                    </li>

                </ul>

            </div>
 
        </div>
    </body>
</html>
