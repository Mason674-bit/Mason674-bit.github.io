<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Floating Color Palettes</title>
        <link href="css/style.css" rel="stylesheet">
    </head>
    <body>
        <div class="color-palette">
            <h2>My Color Palette</h2>
            <h4 class="color" id="color-1">#8367C7</h4>
            <h4 class="color" id="color-2">#B3E9C7</h4>
            <h4 class="color" id="color-3">#C2F8CB</h4>
        </div>

        <div class="color-palette-2">
            <h2>Refreshing Summer Fun</h2>
            <h4 class="color" id="color-4">#8ecae6</h4>
            <h4 class="color" id="color-5">#219ebc</h4>
            <h4 class="color" id="color-6">#023047</h4>
            <h4 class="color" id="color-7">#ffb703</h4>
            <h4 class="color" id="color-8">#fb8500</h4>
        </div>

        <div class="color-palette-3">
            <h2>Golden Summer Fields</h2>
            <h4 class="color" id="color-9">#ccd5ae</h4>
            <h4 class="color" id="color-10">#e9edc9</h4>
            <h4 class="color" id="color-11">#fefae0</h4>
            <h4 class="color" id="color-12">#faedcd</h4>
            <h4 class="color" id="color-13">#d4a373</h4>
        </div>
    </body>
</html>
